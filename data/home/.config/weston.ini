[core]
xwayland=true

[terminal]
font=Hack Nerd Font Mono
font-size=14

#Changing binding to ctrl
[shell]
binding-modifier=ctrl

#Setting my default window size to 1080p
[output]
name=X1
mode=1920x1080

#Launch the weston terminal
[launcher]
icon=/usr/share/icons/oxygen/base/32x32/apps/utilities-terminal.png
displayname=Terminal
path=/usr/bin/weston-terminal

#Launch the file browser
[launcher]
icon=/usr/share/icons/AdwaitaLegacy/32x32/legacy/system-file-manager.png
displayname=Thunar
path=/usr/bin/thunar

#Launch waydroid
[launcher]
icon=/usr/share/icons/hicolor/32x32/apps/waydroid.png
displayname=Waydroid
path=/opt/start-waydroid.sh

#Shortcut to stop the Waydroid container
[launcher]
icon=/usr/share/icons/hicolor/32x32/apps/waydroid.png
displayname=Stop Waydroid
path=/opt/stop-waydroid.sh
